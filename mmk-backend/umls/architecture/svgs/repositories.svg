link UserRepository to PlayerRepository--><!--MD5=[bcd3982a33c516d235c51dfa723c7544]
link PlayerRepository to FieldRepository--><!--MD5=[93834603d62d8c1bc455a3d32aa94eed]
link UserRepository to MatchmakingRequestRepository--><!--MD5=[44a16d2fe470a9514a4f07fb5103eef3]
link MatchmakingRequestRepository to MatchRepository--><!--MD5=[2a34223a676b52392677b768c357c1a2]
link MatchRepository to MatchParticipantRepository--><!--MD5=[8958bdc37dc3f0f0b80f2472cd9c9782]
@startuml
package "repository" {

  interface UserRepository <<JpaRepository<User, Long>>> {
    + findByEmail(email)
    + existsByEmail(email)
  }

  interface PlayerRepository <<JpaRepository<Player, Long>>> {
    + findByUserId(userId)
  }

  interface FieldRepository <<JpaRepository<Field, Long>>> {
  }

  interface MatchmakingRequestRepository <<JpaRepository<MatchmakingRequest, Long>>> {
    + findByPlayerId(playerId)
    + findByStatus(status)
  }

  interface MatchRepository <<JpaRepository<Match, Long>>> {
    + findByStatus(status)
  }

  interface MatchParticipantRepository <<JpaRepository<MatchParticipant, Long>>> {
    + findByMatchId(matchId)
    + findByPlayerId(playerId)
  }
}
@enduml

