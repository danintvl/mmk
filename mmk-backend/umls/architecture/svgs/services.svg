link AuthService to UserService--><!--MD5=[3b8f1880ef45af15a5442b8d69d8ae1f]
link AuthService to PlayerService--><!--MD5=[86f2bba49e58b74420369e932e3f228d]
@startuml
package "service" {

  class AuthService {
    + register()
    + login()
  }

  class UserService {
    + getUserById()
    + updateUser()
    + deactivateUser()
  }

  class PlayerService {
    + createPlayerProfile()
    + getPlayerById()
    + updatePlayer()
    + getPlayerMatchmakingRequests()
  }

  class MatchmakingRequestService {
    + createMatchmakingRequest()
    + getMatchmakingRequestById()
    + cancelMatchmakingRequest()
    + getMatchedMatch()
  }

  class MatchService {
    + getMatchById()
    + getAllMatches()
    + getMatchParticipants()
    + confirmMatch()
    + cancelMatch()
    + createMatch()
  }

  class MatchmakingService {
    + tryMatchmaking()
    + findCompatibleRequests()
    + selectCommonField()
    + createMatchFromRequests()
  }

  MatchmakingRequestService - -> MatchmakingService
  MatchmakingService - -> MatchService
}
@enduml

